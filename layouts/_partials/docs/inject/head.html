{{- if not (.Page.Store.Get "katex") -}}
<link rel="stylesheet" href="{{ "katex/katex.min.css" | relURL }}" />
<script defer src="{{ "katex/katex.min.js" | relURL }}"></script>
{{- with resources.Get "katex.json" | minify -}}
<script defer src="{{ "katex/auto-render.min.js" | relURL }}" onload="var article=document.querySelector('.book-article');if(article){renderMathInElement(article, {{ .Content | safeJS }});}"></script>
{{- end -}}
{{- .Page.Store.Set "katex" true -}}
{{- end -}}

<!-- 修复页面布局问题 -->
<style>
/* 防止竖排文字 */
html, body, .book-page, .book-article, .markdown {
  writing-mode: horizontal-tb !important;
  text-orientation: mixed !important;
  direction: ltr !important;
}

/* 限制容器宽度 */
.book-page {
  max-width: 100%;
  overflow-x: hidden;
}

.book-article {
  max-width: 100%;
  overflow-x: hidden;
}

/* 强制文本换行 */
.book-article p,
.book-article li {
  word-break: break-word;
  overflow-wrap: break-word;
  white-space: normal !important;
}

/* 图片限制 */
.book-article img {
  max-width: 100%;
  height: auto;
}
</style>
